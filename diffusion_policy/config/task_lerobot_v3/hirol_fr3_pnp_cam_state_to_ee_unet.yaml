name: hirol_fr3_pnp_cam_state_to_ee_unet


image_shape: &image_shape [3, 224, 224]
shape_meta: &shape_meta
  obs:
    ee_cam_color:
      shape: *image_shape
      type: rgb
    third_person_cam_color:
      shape: *image_shape
      type: rgb
    side_cam_color:
      shape: *image_shape
      type: rgb
    state_ee:
      shape: [15]
      type: low_dim
      components:
        ee_position: [0, 3]
        ee_quaternion: [3, 7]
        joint_positions: [7, 14]
        gripper_width: [14, 15]
  action:
    shape: [8]
    components:
      ee_position: [0, 3]
      ee_quaternion: [3, 7]
      gripper_width: [7, 8]

env_runner:
  _target_: diffusion_policy.env_runner.hirol_fr3_runner.HirolFr3Runner
  test_start_seed: 100000

dataset:
  _target_: diffusion_policy.dataset.hirol_lerobot_v3_dataset.HirolLeRobotV3Dataset
  shape_meta: *shape_meta
  dataset_path: ${dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.05
  max_train_episodes: null
  window_sampling_strategy: idx
  image_feature_map:
    ee_cam_color: observation.images.ee_cam_color
    third_person_cam_color: observation.images.third_person_cam_color
    side_cam_color: observation.images.side_cam_color
  lowdim_feature_groups:
    state_ee:
      - observation.state
  action_feature_fields:
    - action.ee_pose
    - action.gripper_width
  timestamp_key: timestamp
  timestamp_step_sec: null
  timestamp_tolerance_sec: null
  local_files_only: true
  # Host requirement for preload_images=true:
  # - Linux training host is preferred because DataLoader workers use fork and can share
  #   the read-only numpy cache with copy-on-write.
  # - This task has 3 RGB cameras at 224x224 stored as float32 CHW after preload:
  #   3 cameras * 3 * 224 * 224 * 4 bytes ~= 1.72 MiB per frame.
  # - Estimated image cache RAM ~= 1.72 MiB * total_frame_count, before DataLoader
  #   prefetch batches, model, CUDA pinned memory, and OS reserve.
  # - Practical rule: 30-episode small runs are usually fine on 64 GB RAM; for larger
  #   datasets, compute the estimate above and keep at least 15-20 GB extra headroom.
  # - If RAM is insufficient, run with task.dataset.preload_images=False, or set
  #   training.max_ram_gb so the dataset can disable preload when over budget.
  preload_images: true
