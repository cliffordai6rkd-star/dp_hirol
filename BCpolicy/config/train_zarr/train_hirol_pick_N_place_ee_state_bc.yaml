defaults:
  - _self_
  - /task_zarr@task: hirol_pick_N_place_ee_state

name: train_hirol_pick_N_place_ee_state_bc
_target_: diffusion_policy.workspace.train_diffusion_unet_image_workspace.TrainDiffusionUnetImageWorkspace

dataset_path: ???

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: ${name}

task:
  dataset:
    # Full in-memory zarr path:
    # - load_into_memory caches raw zarr arrays; preload_images also stores resized
    #   float32 CHW RGB frames in RAM.
    # - This zarr task declares 3 cameras at 480x640, so image preload is about
    #   3 cameras * 3 * 480 * 640 * 4 bytes ~= 10.55 MiB per frame.
    # - Only use this on a large-RAM Linux host after estimating total_frame_count.
    #   For example, 3000 frames is already about 31 GiB for image cache alone.
    # - Disable preload_images or set training.max_ram_gb on smaller machines.
    load_into_memory: True
    preload_images: True

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: BCpolicy.policy.bc_image_policy.BCImagePolicy
  shape_meta: ${shape_meta}

  obs_encoder:
    _target_: diffusion_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
      _target_: diffusion_policy.model.vision.model_getter.get_resnet
      name: resnet18
      weights: IMAGENET1K_V1
    resize_shape: null
    crop_shape: [216, 288]
    random_crop: True
    use_group_norm: True
    share_rgb_model: True
    imagenet_norm: True

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  hidden_dims: [1024, 1024, 512]
  activation: gelu
  dropout: 0.0
  loss_on_action_steps_only: False

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 1

val_dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: False
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 1

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  max_ram_gb: null
  memory_reserve_gb: 4.0
  enforce_process_ram_limit: False
  lr_scheduler: cosine
  lr_warmup_steps: 100
  num_epochs: 100
  gradient_accumulate_every: 1
  use_ema: False
  freeze_encoder: True
  rollout_every: 100
  checkpoint_every: 10
  val_every: 1
  sample_every: 999
  max_train_steps: 500
  max_val_steps: 40
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}", "bc_ablation", "zarr"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 5
    format_str: 'epoch={epoch:04d}-val_loss={val_loss:.6f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  searchpath:
    - file://${oc.env:DIFFUSION_POLICY_CONFIG_DIR,/home/hirol/code/diffusion_policy/diffusion_policy/config}
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
